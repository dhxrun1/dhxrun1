<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="30%" stop-color="#3B0A6B"/>
      <stop offset="60%" stop-color="#7303C0"/>
      <stop offset="85%" stop-color="#00C6FF"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
    <radialGradient id="planetGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FDEB71"/>
      <stop offset="60%" stop-color="#FCA311"/>
      <stop offset="100%" stop-color="#B5540A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D2FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00D2FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rocketBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B9E7FF"/>
    </linearGradient>
    <filter id="softStar">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Background sky -->
  <rect width="1000" height="220" fill="url(#sky)"/>

  <!-- Soft nebula glow -->
  <circle cx="820" cy="60" r="140" fill="url(#glow)"/>
  <circle cx="150" cy="180" r="120" fill="url(#glow)" opacity="0.6"/>

  <!-- Stars -->
  <g fill="#FFFFFF" filter="url(#softStar)">
    <circle cx="40" cy="30" r="1.6"/>
    <circle cx="90" cy="70" r="1.1"/>
    <circle cx="140" cy="20" r="1.4"/>
    <circle cx="200" cy="55" r="1.8"/>
    <circle cx="260" cy="15" r="1.1"/>
    <circle cx="320" cy="40" r="1.3"/>
    <circle cx="60" cy="120" r="1.2"/>
    <circle cx="180" cy="140" r="1.5"/>
    <circle cx="250" cy="100" r="1.1"/>
    <circle cx="700" cy="25" r="1.5"/>
    <circle cx="760" cy="60" r="1.1"/>
    <circle cx="900" cy="35" r="1.6"/>
    <circle cx="950" cy="80" r="1.2"/>
    <circle cx="860" cy="140" r="1.3"/>
    <circle cx="600" cy="160" r="1.1"/>
    <circle cx="500" cy="30" r="1.4"/>
    <circle cx="430" cy="70" r="1.1"/>
    <circle cx="980" cy="150" r="1.3"/>
    <circle cx="20" cy="180" r="1.2"/>
    <circle cx="120" cy="190" r="1.1"/>
  </g>

  <!-- Sparkle stars (4-point) -->
  <g fill="#FDEB71">
    <path d="M 340 25 L 343 33 L 351 36 L 343 39 L 340 47 L 337 39 L 329 36 L 337 33 Z"/>
    <path d="M 890 170 L 892 176 L 898 178 L 892 180 L 890 186 L 888 180 L 882 178 L 888 176 Z"/>
    <path d="M 70 90 L 72 95 L 77 97 L 72 99 L 70 104 L 68 99 L 63 97 L 68 95 Z"/>
  </g>

  <!-- Distant planet, top right -->
  <circle cx="905" cy="55" r="34" fill="url(#planetGrad)"/>
  <ellipse cx="905" cy="55" rx="50" ry="9" fill="none" stroke="#FDEB71" stroke-width="2.5" opacity="0.85" transform="rotate(-18 905 55)"/>

  <!-- Small moon -->
  <circle cx="70" cy="45" r="12" fill="#D9D9F5" opacity="0.9"/>
  <circle cx="66" cy="41" r="2.5" fill="#B9B9D9" opacity="0.7"/>
  <circle cx="75" cy="50" r="1.8" fill="#B9B9D9" opacity="0.7"/>

  <!-- Rocket with trail, lower left area -->
  <g transform="translate(60,150) rotate(-35)">
    <path d="M0,-10 C10,-8 14,2 12,14 L-12,14 C-14,2 -10,-8 0,-10 Z" fill="url(#rocketBody)"/>
    <path d="M-12,14 L-20,26 L-8,20 Z" fill="#EC38BC"/>
    <path d="M12,14 L20,26 L8,20 Z" fill="#EC38BC"/>
    <circle cx="0" cy="0" r="4" fill="#00D2FF"/>
    <path d="M-6,14 C-6,24 0,34 0,34 C0,34 6,24 6,14 Z" fill="#FDEB71" opacity="0.9"/>
  </g>

  <!-- Title text -->
  <text x="500" y="105" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="46" font-weight="bold" fill="#FFFFFF">
    Dharun Kumar K
  </text>

  <!-- Subtitle -->
  <text x="500" y="140" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="18" fill="#B9E7FF">
    Exploring the Universe of Code · Cybersecurity · AI &amp; Data Science
  </text>

  <!-- Orbit ring decoration under text -->
  <ellipse cx="500" cy="165" rx="230" ry="6" fill="none" stroke="#00D2FF" stroke-width="1.5" opacity="0.5"/>
</svg>
